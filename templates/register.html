<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Task Collaboration</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            base: "#f6f4ee",
            ink: "#151515",
            accent: "#0f766e"
          },
          fontFamily: {
            display: ["Poppins", "ui-sans-serif", "system-ui"],
            body: ["DM Sans", "ui-sans-serif", "system-ui"]
          }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Poppins:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body class="min-h-screen bg-base text-ink font-body">
  <div class="fixed inset-0 -z-10">
    <div class="absolute left-0 top-0 h-72 w-72 rounded-full bg-emerald-200/60 blur-3xl"></div>
    <div class="absolute bottom-0 right-0 h-72 w-72 rounded-full bg-orange-200/60 blur-3xl"></div>
  </div>

  <main class="mx-auto flex min-h-screen max-w-xl items-center px-4 py-10">
    <section class="page-fade card-lift w-full rounded-3xl bg-white p-8 shadow-xl shadow-zinc-300/60">
      <h1 class="font-display text-3xl">Register</h1>
      <p class="mt-2 text-sm text-zinc-600">Request OTP with your email and role, then verify to complete registration.</p>

      <form id="register-request-form" class="mt-6 space-y-3">
        <input id="register-email" aria-label="Register email" type="email" placeholder="Email" required class="w-full rounded-xl border border-zinc-200 bg-zinc-50 px-4 py-2 outline-none focus:border-accent" />
        <select id="register-role" required class="w-full rounded-xl border border-zinc-200 bg-zinc-50 px-4 py-2 outline-none focus:border-accent">
          <option value="">Select role</option>
          <option value="Manager">Manager</option>
          <option value="Member">Member</option>
        </select>
        <button class="w-full rounded-xl bg-ink px-4 py-2 font-medium text-white transition hover:opacity-90">Request Registration OTP</button>
      </form>

      <form id="register-verify-form" class="mt-4 space-y-3">
        <input id="register-otp" aria-label="Registration OTP" type="text" placeholder="Enter OTP" required class="w-full rounded-xl border border-zinc-200 bg-zinc-50 px-4 py-2 outline-none focus:border-accent" />
        <button class="w-full rounded-xl bg-accent px-4 py-2 font-medium text-white transition hover:bg-teal-700">Verify Registration OTP</button>
      </form>

      <p class="mt-6 text-sm text-zinc-600">
        Already have an account?
        <a href="/login" class="font-medium text-teal-700 hover:underline">Go to login</a>
      </p>
    </section>
  </main>

  <div id="toast" class="pointer-events-none fixed bottom-4 right-4 hidden rounded-xl bg-zinc-900 px-4 py-2 text-sm text-white shadow-xl"></div>
  <script src="{{ url_for('static', filename='auth.js') }}"></script>
</body>
</html>
