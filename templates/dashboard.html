<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Collaboration Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            base: "#f6f4ee",
            ink: "#151515",
            accent: "#0f766e",
            accentSoft: "#dff6f2",
            warning: "#f59e0b",
            ok: "#16a34a"
          },
          fontFamily: {
            display: ["Poppins", "ui-sans-serif", "system-ui"],
            body: ["DM Sans", "ui-sans-serif", "system-ui"]
          }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Poppins:wght@500;700&display=swap" rel="stylesheet" />
</head>
<body class="min-h-screen bg-base text-ink font-body">
  <div class="fixed inset-0 -z-10">
    <div class="absolute left-0 top-0 h-64 w-64 rounded-full bg-accent/20 blur-3xl"></div>
    <div class="absolute bottom-0 right-0 h-72 w-72 rounded-full bg-amber-200/60 blur-3xl"></div>
  </div>

  <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
    <header class="mb-8 flex flex-wrap items-center justify-between gap-4">
      <div>
        <h1 class="font-display text-3xl sm:text-4xl">Multi-User Task Collaboration</h1>
        <p class="mt-2 text-sm text-zinc-600">Role-aware board with instant task status updates.</p>
      </div>
      <div id="user-chip" class="rounded-full bg-white px-4 py-2 text-sm shadow"></div>
    </header>

    <section id="dashboard-section" class="space-y-6">
      <div class="flex flex-wrap items-center justify-between gap-3 rounded-2xl bg-white p-4 shadow-lg shadow-zinc-200/70">
        <p id="role-note" class="text-sm text-zinc-700"></p>
        <button id="logout-btn" class="rounded-xl bg-zinc-900 px-4 py-2 text-sm font-medium text-white">Logout</button>
      </div>

      <div id="manager-create-panel" class="hidden rounded-2xl bg-white p-6 shadow-lg shadow-zinc-200/70">
        <h3 class="font-display text-lg">Create Task (Manager)</h3>
        <form id="create-task-form" class="mt-4 grid gap-3 md:grid-cols-4">
          <input id="task-title" aria-label="Task title" type="text" placeholder="Task title" required class="rounded-xl border border-zinc-200 bg-zinc-50 px-4 py-2 outline-none focus:border-accent md:col-span-2" />
          <input id="task-assigned-to" aria-label="Assign to member email" type="email" placeholder="Assign to member email" required class="rounded-xl border border-zinc-200 bg-zinc-50 px-4 py-2 outline-none focus:border-accent" />
          <input id="task-due-date" aria-label="Task due date" type="date" class="rounded-xl border border-zinc-200 bg-zinc-50 px-4 py-2 outline-none focus:border-accent" />
          <button class="rounded-xl bg-accent px-4 py-2 font-medium text-white md:col-span-4">Create Task</button>
        </form>
      </div>

      <div class="grid gap-4 md:grid-cols-3">
        <article class="rounded-2xl bg-white p-4 shadow-lg shadow-zinc-200/70">
          <h4 class="font-display text-lg">To Do</h4>
          <p class="mt-1 text-xs text-zinc-500">Drag cards here or use quick move buttons.</p>
          <div id="todo-column" data-status="To Do" class="mt-3 min-h-28 space-y-3 rounded-xl border border-dashed border-zinc-200 p-2 transition"></div>
        </article>
        <article class="rounded-2xl bg-white p-4 shadow-lg shadow-zinc-200/70">
          <h4 class="font-display text-lg">In Progress</h4>
          <p class="mt-1 text-xs text-zinc-500">Drag cards here or use quick move buttons.</p>
          <div id="inprogress-column" data-status="In Progress" class="mt-3 min-h-28 space-y-3 rounded-xl border border-dashed border-zinc-200 p-2 transition"></div>
        </article>
        <article class="rounded-2xl bg-white p-4 shadow-lg shadow-zinc-200/70">
          <h4 class="font-display text-lg">Done</h4>
          <p class="mt-1 text-xs text-zinc-500">Drag cards here or use quick move buttons.</p>
          <div id="done-column" data-status="Done" class="mt-3 min-h-28 space-y-3 rounded-xl border border-dashed border-zinc-200 p-2 transition"></div>
        </article>
      </div>
    </section>

    <div id="toast" class="pointer-events-none fixed bottom-4 right-4 hidden rounded-xl bg-zinc-900 px-4 py-2 text-sm text-white shadow-xl"></div>
  </main>

  <script src="{{ url_for('static', filename='board.js') }}"></script>
</body>
</html>
